<!DOCTYPE html>
<html>
    <head>
        <title>EventBubbling</title>
        <style>
            .parent{
                width:400px;
                height:400px;
                background-color: rgb(41, 67, 58);
                color: aliceblue;
            }
            .child{
                width: 300px;
                height:300px;
                margin-top: 35px;
                margin-left: 35px;
                background-color: rgb(241, 173, 84);
            }
            .subchild{
                width:200px;
                height:200px;
                margin-top: 35px;
                margin-left: 45px;
                background-color: rgb(103, 103, 4);
            }
        </style>
    </head>
    <body>
        <div class="parent">
            parent
            <div class="child">
                child
                <div class="subchild">
                    subchild
                </div>
            </div>
        </div>
    </body>
    <script>
        document.querySelector(".subchild").addEventListener("click",()=>{
            document.querySelector(".subchild").style.backgroundColor="pink";
        });
        document.querySelector(".child").addEventListener("click",(event)=>{
            event.stopPropagation();
           setTimeout( ()=>{document.querySelector(".child").style.backgroundColor="lightblue"},150);
        });
        document.querySelector(".parent").addEventListener("click",()=>{
            setTimeout( ()=>{document.querySelector(".parent").style.backgroundColor="lightgreen"},300);
        })
    </script>
</html>
